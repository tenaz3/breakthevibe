<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BreakTheVibe{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32.png">

    <!-- Theme init (prevent flash) -->
    <script>
        (function() {
            var stored = localStorage.getItem('btv-theme');
            if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: 'var(--background)',
                        foreground: 'var(--foreground)',
                        card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
                        popover: { DEFAULT: 'var(--popover)', foreground: 'var(--popover-foreground)' },
                        primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
                        secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
                        muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
                        accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
                        destructive: { DEFAULT: 'var(--destructive)', foreground: 'var(--destructive-foreground)' },
                        border: 'var(--border)',
                        input: 'var(--input)',
                        ring: 'var(--ring)',
                        success: 'var(--success)',
                        warning: 'var(--warning)',
                    },
                    borderRadius: {
                        lg: 'var(--radius)',
                        md: 'calc(var(--radius) - 2px)',
                        sm: 'calc(var(--radius) - 4px)',
                    },
                    fontFamily: {
                        sans: ['"Inter"', 'system-ui', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                }
            }
        }
    </script>

    <link rel="stylesheet" href="/static/css/style.css?v=2">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-background text-foreground min-h-screen antialiased font-sans flex flex-col">
    {% block nav %}
    <!-- Navigation -->
    <nav class="sticky top-0 z-40 border-b border-border bg-background/80 backdrop-blur-xl">
        <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
            <a href="/" class="font-bold text-[0.9375rem] tracking-tight text-foreground hover:opacity-70 transition-opacity">
                BreakTheVibe
            </a>
            <div class="flex items-center gap-1">
                {% set current_path = request.url.path if request else '' %}
                <a href="/" class="px-3 py-1.5 text-[0.8125rem] {% if current_path == '/' or current_path.startswith('/projects') %}text-foreground font-medium{% else %}text-muted-foreground{% endif %} hover:text-foreground hover:bg-accent rounded-md transition-all">
                    Projects
                </a>
                <a href="/settings/llm" class="px-3 py-1.5 text-[0.8125rem] {% if current_path.startswith('/settings') %}text-foreground font-medium{% else %}text-muted-foreground{% endif %} hover:text-foreground hover:bg-accent rounded-md transition-all">
                    Settings
                </a>
                <div class="w-px h-4 bg-border mx-1"></div>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
                    <!-- Sun icon (visible in dark mode) -->
                    <svg class="theme-icon-sun" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <!-- Moon icon (visible in light mode) -->
                    <svg class="theme-icon-moon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </div>
    </nav>
    {% endblock nav %}

    {% block body_content %}
    <main class="max-w-6xl mx-auto px-6 py-8 animate-fade-in">
        {% block content %}{% endblock %}
    </main>
    {% endblock body_content %}

    <!-- Toast container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none" role="status" aria-live="polite"></div>

    <!-- Confirmation dialog -->
    <dialog id="confirm-dialog" class="dialog">
        <div class="dialog-content">
            <h3 id="confirm-title" class="dialog-title">Are you sure?</h3>
            <p id="confirm-message" class="dialog-description"></p>
            <div class="dialog-actions">
                <button onclick="closeConfirmDialog()" class="btn btn-secondary">Cancel</button>
                <button id="confirm-action" class="btn btn-destructive">Delete</button>
            </div>
        </div>
    </dialog>

    <script>
    /* ── Theme Toggle ────────────────────────────────────────── */
    document.getElementById('theme-toggle').addEventListener('click', function() {
        var html = document.documentElement;
        html.classList.toggle('dark');
        localStorage.setItem('btv-theme', html.classList.contains('dark') ? 'dark' : 'light');
    });

    /* ── Toast ───────────────────────────────────────────────── */
    function showToast(message, type) {
        type = type || 'error';
        var container = document.getElementById('toast-container');
        var toast = document.createElement('div');
        var cls = {
            error: 'toast toast-error',
            success: 'toast toast-success',
            warning: 'toast toast-warning',
            info: 'toast toast-info',
        };
        toast.className = (cls[type] || cls.info) + ' translate-y-2 opacity-0';

        var span = document.createElement('span');
        span.textContent = message;
        toast.appendChild(span);

        var close = document.createElement('button');
        close.className = 'ml-auto opacity-50 hover:opacity-100 transition-opacity cursor-pointer flex items-center';
        close.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>';
        close.addEventListener('click', function() { dismissToast(toast); });
        toast.appendChild(close);

        container.appendChild(toast);
        requestAnimationFrame(function() {
            toast.classList.remove('translate-y-2', 'opacity-0');
        });
        setTimeout(function() { dismissToast(toast); }, 4000);
    }

    function dismissToast(toast) {
        toast.classList.add('translate-y-2', 'opacity-0');
        setTimeout(function() { toast.remove(); }, 300);
    }

    /* ── Confirmation Dialog ─────────────────────────────────── */
    var confirmCallback = null;

    function openConfirmDialog(title, message, actionLabel, callback) {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        document.getElementById('confirm-action').textContent = actionLabel;
        confirmCallback = callback;
        document.getElementById('confirm-dialog').showModal();
    }

    function closeConfirmDialog() {
        document.getElementById('confirm-dialog').close();
        confirmCallback = null;
    }

    document.getElementById('confirm-action').addEventListener('click', function() {
        if (confirmCallback) confirmCallback();
        closeConfirmDialog();
    });

    /* Focus management for accessibility */
    document.addEventListener('htmx:afterSettle', function() {
        var h1 = document.querySelector('main h1');
        if (h1) { h1.setAttribute('tabindex', '-1'); h1.focus({ preventScroll: true }); }
    });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
