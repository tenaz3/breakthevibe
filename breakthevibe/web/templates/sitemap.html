{% extends "base.html" %}
{% block title %}Mind-Map — {{ project.name }}{% endblock %}
{% block head %}
{% endblock %}
{% block content %}
<a href="/projects/{{ project.id }}" class="back-link">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
    {{ project.name }}
</a>

<div class="page-header">
    <h1>Site Mind-Map</h1>
</div>

<div id="mindmap-container" class="w-full" style="min-height: 600px"
     data-sitemap-url="/api/projects/{{ project.id }}/sitemap">
</div>
{% endblock %}

{% block scripts %}
<script>
var d3Loaded = false;
function loadMindmap() {
    if (d3Loaded) return;
    d3Loaded = true;
    var s = document.createElement('script');
    s.src = 'https://d3js.org/d3.v7.min.js';
    s.onload = function() {
        var m = document.createElement('script');
        m.src = '/static/js/mindmap.js';
        document.body.appendChild(m);
    };
    document.body.appendChild(s);
}
/* Load immediately since this is a dedicated mindmap page */
document.addEventListener('DOMContentLoaded', loadMindmap);
</script>
{% endblock %}
